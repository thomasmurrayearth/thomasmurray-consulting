<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Startup Journey — Thomas Murray</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Platypi:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F8F5F0;--surface:#FFFFFF;--surface2:#F3EFE9;
  --border:#E3DDD5;--border-lt:#EDE9E3;
  --text:#1A1917;--text-2:#6B6460;--text-3:#A09488;
  --green:#2D5A3D;--green-mid:#3D7A53;--green-bg:#EAF2ED;--green-bdr:#BAD4C3;
  --s1:#7968A0;--s2:#4A7CA8;--s3:#3A8C72;
  --s4:#5A8A38;--s5:#B5872A;--s6:#B5622A;--s7:#A03535;
  --sc:var(--s1);
}

body{
  background:var(--bg);color:var(--text);
  font-family:'Manrope',-apple-system,sans-serif;font-size:14px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}
html{scroll-padding-top:110px}

/* ── Nav ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 40px;gap:32px;
}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-right:auto}
.nav a{font-size:13px;color:var(--text-2);transition:color .12s}
.nav a:hover{color:var(--text)}

.wrap{padding-top:52px;position:relative}

/* ── Growth curve canvas ── */
.curve-bg{
  position:absolute;top:52px;left:0;right:0;
  pointer-events:none;z-index:0;overflow:hidden;
}
#growthCurve{display:block;width:100%}
.hero,.stage-bar,.panel-wrap{position:relative;z-index:1}

/* ── Hero ── */
.hero{max-width:860px;margin:0 auto;padding:80px 40px 320px}
.hero h1{
  font-size:54px;font-weight:500;line-height:1.07;
  letter-spacing:-.9px;color:var(--text);margin-bottom:24px;
}
.hero h1 em{font-style:normal;font-weight:800;color:var(--green)}
.hero-sub{font-family:'Platypi',Georgia,serif;font-weight:400;font-size:17px;line-height:1.72;color:var(--text-2);max-width:540px}

/* ── Stage bar ── */
.stage-bar{
  position:sticky;top:52px;z-index:100;
  background:transparent;
  border-bottom:1px solid rgba(227,221,213,0.4);
  transition:background .18s, border-color .18s,
             -webkit-backdrop-filter .18s, backdrop-filter .18s;
}
/* Applied via JS once bar scrolls over panel content */
.stage-bar.bar-stuck{
  background:rgba(248,245,240,0.88);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border-bottom-color:var(--border);
}
.stage-tabs{
  display:flex;overflow-x:auto;
  max-width:1440px;margin:0 auto;padding:0 40px;
  scrollbar-width:none;
}
.stage-tabs::-webkit-scrollbar{display:none}
/* Edge fades hint that more tabs exist off-screen */
.stage-tabs.fade-r{-webkit-mask-image:linear-gradient(90deg,#000 calc(100% - 48px),transparent);mask-image:linear-gradient(90deg,#000 calc(100% - 48px),transparent)}
.stage-tabs.fade-l{-webkit-mask-image:linear-gradient(90deg,transparent,#000 48px);mask-image:linear-gradient(90deg,transparent,#000 48px)}
.stage-tabs.fade-l.fade-r{-webkit-mask-image:linear-gradient(90deg,transparent,#000 48px,#000 calc(100% - 48px),transparent);mask-image:linear-gradient(90deg,transparent,#000 48px,#000 calc(100% - 48px),transparent)}
.tab{
  flex:1 1 0;min-width:112px;cursor:pointer;user-select:none;
  padding:14px 20px 11px;
  border-bottom:3px solid transparent;transition:background .12s;
}
.tab:hover{background:var(--surface2)}
.tab-fund{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;
  color:var(--text-3);margin-bottom:4px;transition:color .12s;
}
.tab-name{
  font-size:12px;font-weight:500;line-height:1.35;color:var(--text-2);
  transition:color .12s,font-weight .12s;
}
.tab.on{border-bottom-color:var(--sc)}
.tab.on .tab-fund{color:var(--sc)}
.tab.on .tab-name{color:var(--text);font-weight:600}

/* ── Panel ── */
.panel-wrap{max-width:1440px;margin:0 auto;padding:0 40px 100px}
.panel{animation:fadeUp .2s ease both}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* Stage header */
.s-hdr{padding:40px 0 28px;border-bottom:1px solid var(--border)}
.s-fund{
  display:inline-flex;align-items:center;gap:10px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;
  color:var(--sc);margin-bottom:10px;
}
.s-fund::after{content:'';width:36px;height:1px;background:currentColor;opacity:.4}
.s-hdr h2{font-size:28px;font-weight:500;letter-spacing:-.4px;line-height:1.2;margin-bottom:6px}
.s-meta{font-size:12.5px;color:var(--text-3);margin-bottom:12px}
.s-intro{font-size:15px;line-height:1.72;color:var(--text-2);max-width:740px}

/* Column legend — 3 cols to match dim grid */
.col-leg{
  display:grid;grid-template-columns:148px 1fr 1fr;
  border-bottom:1px solid var(--border);padding:10px 0 8px;
}
.cl{padding:0 20px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3)}
.cl.green-head{color:var(--green-mid)}

/* ── Dimension rows ── */
.dim{
  display:grid;
  /* label col | body (internally 2-col) */
  grid-template-columns:148px 1fr;
  border-bottom:1px solid var(--border-lt);
  cursor:pointer;transition:background .1s;
}
.dim:hover{background:rgba(0,0,0,.016)}
.dim.open{background:var(--surface)}

/* Label column */
.d-lbl{
  padding:20px 14px;
  border-right:1px solid var(--border-lt);
  display:flex;flex-direction:column;gap:5px;
}
.d-icon{font-size:16px;line-height:1;margin-bottom:2px}
.d-name{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text-2)}
.d-exp{
  margin-top:auto;padding-top:14px;
  font-size:10px;color:var(--text-3);
  display:flex;align-items:center;gap:4px;
}
.d-exp svg{transition:transform .2s;flex-shrink:0}
.dim.open .d-exp svg{transform:rotate(180deg)}

/* Body: 2-column sub-grid — activities LEFT, contributions RIGHT */
.d-body{
  display:grid;
  grid-template-columns:1fr 1fr;
}

/* Each activity occupies one cell of the left column.
   Its paired contribution occupies the adjacent right cell.
   act-l + act-r are direct children of .d-body so the grid
   auto-places them as a row pair. */
.act-l{
  padding:12px 20px;
  border-right:1px solid var(--border-lt);
  border-bottom:1px solid var(--border-lt);
  font-size:13px;color:var(--text);line-height:1.52;
  padding-left:32px;position:relative;
  display:flex;align-items:flex-start;
}
.act-l::before{
  content:'·';position:absolute;left:20px;top:12px;
  color:var(--text-3);font-size:18px;line-height:1.15;
}

/* Activity that has a paired contribution — subtle green accent */
.act-l.linked{
  background:rgba(45,90,61,.024);
  border-left:3px solid var(--green-bdr);
  padding-left:29px;/* compensate for border */
}
.act-l.linked::before{left:17px}

/* Extra (hidden until expanded) */
.act-l.x,.act-r.x{display:none}
.dim.open .act-l.x,.dim.open .act-r.x{display:flex}
.act-r.x{display:none}
.dim.open .act-r.x{display:block}

/* Right cell — empty or contribution card */
.act-r{
  padding:12px 16px;
  border-bottom:1px solid var(--border-lt);
}

/* Contribution card */
.t-card{
  border:1px solid var(--green-bdr);
  border-left:3px solid var(--green);
  border-radius:6px;padding:11px 14px 12px;
  background:var(--green-bg);
}
.t-card-title{font-size:12.5px;font-weight:600;color:var(--green);line-height:1.38}
.t-card-link{
  display:inline-block;margin-top:6px;font-size:11.5px;font-weight:500;
  color:var(--green);text-decoration:underline;text-underline-offset:2px;
  text-decoration-color:var(--green-bdr);
}
.t-card-link:hover{text-decoration-color:var(--green);}
.t-card-body{
  display:none;font-size:12px;line-height:1.65;color:var(--text-2);margin-top:7px;
}
.dim.open .t-card-body{display:block}

/* Outcome row spans both columns */
.outcome-full{
  grid-column:1/-1;
  display:none;
  padding:14px 20px;
  border-top:1px solid var(--border-lt);
  font-size:12px;color:var(--text-2);line-height:1.6;
}
.outcome-full strong{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--sc);margin-right:5px;
}
.dim.open .outcome-full{display:block}

/* ── Mobile ── */
@media(max-width:900px){
  .nav{padding:0 20px;gap:20px}
  .hero{padding:52px 20px 140px}
  .hero h1{font-size:34px}
  .hero-sub{font-size:15px}
  .stage-tabs{padding:0 16px}
  .panel-wrap{padding:0 16px 80px}

  .col-leg{grid-template-columns:104px 1fr}
  .cl.green-head{display:none}

  /* Dim: label + single-column body */
  .dim{grid-template-columns:104px 1fr}
  .d-lbl{
    padding:14px 10px;border-right:none;
    border-bottom:1px solid var(--border-lt);
    flex-direction:row;align-items:center;gap:8px;
  }
  .d-exp{display:none}

  /* Body becomes single column on mobile:
     act-l rows stack, act-r.has-contrib cards appear directly
     below their paired act-l — the visual connection is preserved
     because they are adjacent siblings in DOM order */
  .d-body{grid-template-columns:1fr}
  .act-l{border-right:none}
  /* Hide empty right cells; show contribution cells below their act */
  .act-r:not(.has-contrib){display:none!important}
  .act-r.has-contrib{
    padding:10px 16px 12px 20px;
    border-bottom:1px solid var(--border-lt);
    background:var(--green-bg);
    border-left:3px solid var(--green);
  }
  .dim.open .act-r.has-contrib{display:block}
  /* On mobile show has-contrib for preview rows always */
  .act-r.has-contrib:not(.x){display:block}
}

@media(max-width:1024px){
  .hero h1{font-size:42px}
}
@media(max-width:600px){
  .hero h1{font-size:28px;letter-spacing:-.4px}
  .tab{min-width:104px;padding:12px 14px 9px}
  .tab-fund{font-size:10px}
  .tab-name{font-size:11px}
}
@media(prefers-reduced-motion:reduce){.panel{animation:none}}

</style>
</head>

<div class="wrap">
  <div class="curve-bg" id="curveBg"><canvas id="growthCurve"></canvas></div>
  <div class="hero">
    <h1>The hats I wear<br><em>in a startup.</em></h1>
    <p class="hero-sub">My background is leading law reform and organisational transformation. Here's how that maps to a startup lifecycle.</p>
  </div>

  <div class="stage-bar">
    <div class="stage-tabs" id="stageTabs"></div>
  </div>

</div>

<script>
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const SC={1:'#7968A0',2:'#4A7CA8',3:'#3A8C72',4:'#5A8A38',5:'#B5872A',6:'#B5622A',7:'#A03535'};

/* ── DATA ──────────────────────────────────────────────────────
   Each act: { t: text, p: preview-visible, c: contribution|null }
   c: { h: headline, b: body }
   The contribution is placed in the grid cell DIRECTLY BESIDE
   the activity it corresponds to — making the link visually obvious.
──────────────────────────────────────────────────────────────── */
const STAGES = [

/* ══ 1 ═══════════════════════════════════════════════════════ */
{
  n:1, fund:`Pre-seed`, name:`Idea & Problem Discovery`,
  meta:`Bootstrapped · 1–3 founders`,
  intro:`Before you know what to build, you need to confirm the commercial problem is real and the right people have it. The discovery work at this stage sets the foundation for everything else.`,
  dims:[
    {
      icon:`⊕`, name:`Operations & Automation`,
      acts:[
        {t:`Choose an entity structure compatible with institutional investment in your jurisdiction — restructuring after committing to investors is expensive and distracting to manage while simultaneously closing a round`,p:true,c:null},
        {t:`Define co-founder roles, equity, and decision-making authority explicitly and in writing before starting`,p:true,c:{
          h:`Co-founder governance & decision-rights design`,
          b:`I design the governance framework that makes co-founder relationships durable before capital arrives: who owns which decisions, what requires consensus, and how disagreements get resolved. The legal documentation belongs to a lawyer — the decision architecture that makes it meaningful belongs to me. Getting clarity here before a fundraise is significantly cheaper than renegotiating it during one.`
        }},
        {t:`Set up the minimum viable operational stack: business banking, shared file storage, task tracking, and AI meeting notes — as low-cost as possible`,p:false,c:{
          h:`AI-first operational setup`,
          b:`I set up the complete administrative infrastructure from day one using AI tools: banking linked to automated accounting, document management, project tracking, and AI note-taking across every call. Everything is configured to run automatically and cost near-zero to maintain — no dedicated ops hire required. A founding team should spend its time on product and customers, not administrative overhead.`
        }},
        {t:`Document what you build as you build it — institutional knowledge captured from day one is far cheaper to capture than to reconstruct later`,p:false,c:{
          h:`Knowledge-preservation infrastructure`,
          b:`I designed the knowledge-preservation and learning system for local government agencies rolling out New Zealand's Natural and Build Environment Act. 'Learning by doing' only works if you encode the learnings, so I set up the database structure, learning conventions, and discipline to capture each lesson as we built new workflows and partnerships, meaning we never had to make the same mistake twice.`
        }},
      ],
      outcome:`Core administrative infrastructure is in place and costs near-zero to run; co-founder roles, equity, and decision-making authority are documented and agreed before any outside capital is raised.`
    },
    {
      icon:`⬡`, name:`Product`,
      acts:[
        {t:`Assess your technology readiness level (TRL) honestly — distinguish what is proven from what is assumed, so you don't build a commercial roadmap on a technical assumption that unravels when exposed to industrial or customer conditions`,p:true,c:null},
        {t:`Define the specific problem the technology solves, not what it can do in principle — technology without a specific commercial problem attracts scientific interest but rarely converts to revenue`,p:true,c:null},
        {t:`Avoid ideas that are scientifically interesting but solve no acute commercial problem — the technology version of a tarpit idea`,p:false,c:null},
        {t:`Ask "why now?" — what change in cost, regulation, compute, or materials makes this problem solvable today?`,p:false,c:null},
        {t:`Hold the problem tightly; hold the technical approach loosely — customer feedback and technical reality will reshape how you solve it, and committing prematurely to a specific solution prevents you from taking the better path when it emerges`,p:false,c:null},
      ],
      outcome:`The core technical insight is defensible, the problem is confirmed real by domain experts and potential customers, and the founders can articulate why this solution is viable now.`
    },
    {
      icon:`◎`, name:`Market & Customers`,
      acts:[
        {t:`Conduct 20+ structured discovery interviews with potential buyers, specifiers, and operators — these are often different people in industrial markets`,p:true,c:{
          h:`Customer discovery & decision-making unit mapping`,
          b:`I design and run structured interviews with potential buyers, specifiers, and operators. I map who signs, who approves, who operates, and what each of them needs to see before they say yes. Then I synthesise the output into a documented customer profile the whole team can work from.`
        }},
        {t:`Map the full decision-making unit: who specifies, who approves budget, who runs the pilot, who operates? — walking into a commercial conversation without knowing who actually controls the purchase decision wastes time and reveals inexperience with the sector`,p:true,c:{
          h:`Decision-making unit mapping`,
          b:`Mapping a customer's authority structure — who holds formal power, who has informal influence, where decisions actually get made — is structurally the same work as designing governance frameworks for complex programmes. I've done this analysis repeatedly inside government: defining decision rights, escalation paths, and the approval sequences that make large programmes function. I apply the same discipline to map target customers' procurement structures before your team walks into the room.`
        }},
        {t:`Identify whether government is a likely early customer — governments are often the first and best customer for technology and industrial businesses`,p:false,c:{
          h:`Government as early customer — pathway navigation`,
          b:`At the Ministry for the Environment, I worked in strategic partnerships identifying and on-ramping startups and companies as government partners — including co-creating the Innovation Barometer with Creative HQ, an evaluation tool piloted across government and industry. I know how government buys, what it needs to see before it commits, and which parts of government are genuinely open to piloting new technology. I now bring that experience to the other side: helping startups assess whether government is a viable first customer and, if it is, how to navigate the path to a first engagement.`
        }},
        {t:`Assess market readiness: is the market aware the problem exists? Does it need educating before it will buy? — the answer determines whether your primary investment is in commercial sales or in market creation, which have very different cost structures and timelines`,p:false,c:null},
        {t:`Find the beachhead: the smallest specific segment where the technology wins clearly and decisively — winning narrowly and completely is faster and cheaper than trying to win broadly and creates the reference cases that open adjacent segments`,p:false,c:null},
      ],
      outcome:`Target customer profile is documented with specific buyer, specifier, and economic decision-maker roles identified; the beachhead market segment is named and sized.`
    },
    {
      icon:`↗`, name:`Go-to-Market`,
      acts:[
        {t:`Map the full value chain from raw material to end user — technology companies often enter mid-chain as a component, platform, or subsystem`,p:true,c:null},
        {t:`Determine the primary go-to-market model: direct enterprise, licensing, government contracts, or platform — the answer shapes everything else`,p:true,c:null},
        {t:`Identify whether buyers are found through technical conferences, government procurement, or industry relationships — not necessarily online channels`,p:false,c:null},
        {t:`Assess the decision-making unit and typical procurement timeline for the target sector`,p:false,c:null},
        {t:`Note which industry bodies, trade publications, and conferences your target customers trust — credibility travels through the channels buyers already use, not through the ones you prefer`,p:false,c:null},
      ],
      outcome:`The value chain is mapped, the route to a first paying customer is clearly identified, and the primary go-to-market model is chosen.`
    },
    {
      icon:`$`, name:`Funding & Finance`,
      acts:[
        {t:`Bootstrap with personal savings and friends and family capital — keep burn near zero during the pre-validation phase`,p:true,c:null},
        {t:`Identify and pursue non-dilutive government grants from innovation agencies, national research bodies, and sector-specific funds — most governments offer phased programmes that validate scientific merit without requiring equity`,p:true,c:{
          h:`Grant strategy & application support`,
          link:{url:`https://grant-analyzer-production.up.railway.app/`,text:`Find grants using my AI-powered app`},
          b:`At the Ministry for the Environment, I worked in strategic partnerships helping startups navigate the grant application process — identifying the right programmes and structuring applications to match what funders were looking for. I know how government grant programmes work because I've operated inside them. I combine that direct experience with a grant-finder tool I've built to help founders identify the right funding opportunities and submit applications that land.`
        }},
        {t:`Understand how specialist investors evaluate pre-revenue companies: technology readiness, team credibility, and IP position matter as much as market size`,p:false,c:null},
        {t:`Know your funding timeline: pre-revenue phases for hardware and science-based businesses typically last 2–4 years; runway preservation is existential`,p:false,c:null},
      ],
      outcome:`18+ months of runway is secured; a non-dilutive grant strategy is identified and the first application is prepared or in progress.`
    },
  ]
},

/* ══ 2 ═══════════════════════════════════════════════════════ */
{
  n:2, fund:`Pre-seed / Angel`, name:`Build & Launch`,
  meta:`2–6 people`,
  intro:`While you're building, commercial relationship-building has to start. Enterprise and industrial customers have long qualification cycles — the time to be in their system is now, not when the prototype is ready.`,
  dims:[
    {
      icon:`⊕`, name:`Operations & Automation`,
      acts:[
        {t:`Define the company's operating rhythm: weekly team sync, monthly financial review — design cadences that will scale, not ones you'll have to replace`,p:true,c:{
          h:`Operating rhythm & governance cadence design`,
          b:`I design the cadences that will still work when the company is ten times its current size: weekly team alignment, monthly financial review, quarterly strategy check-in — each with a clear purpose, the right participants, and a format that generates decisions rather than updates. I've run governance design in complex multi-team programmes where getting the rhythm right directly determined whether decisions were made on time.`
        }},
        {t:`Map the 3–5 core workflows the team runs every week and deliberately design each one to be automatable`,p:true,c:{
          h:`Core workflow mapping & automation design`,
          b:`I map the workflows the team runs every week and redesign each one for automation: the current manual steps, where decisions are made, what can be handled by AI, and what still needs a human. Using Claude Code and Cowork, I build the automated versions. The result is a team that spends its time on work that requires judgement, not on administration that runs itself.`
        }},
        {t:`Set up payroll and contractor payment automation — configure it once so it runs without ongoing founder involvement`,p:false,c:{
          h:`Payroll & contractor payment automation`,
          b:`I configure payroll and contractor payment systems to run without ongoing founder involvement: integration with accounting, automated tax calculations where the platform handles them, and a payment run the finance function executes without touching a spreadsheet. The compliance knowledge belongs to a payroll specialist — I build the system that makes the process frictionless.`
        }},
        {t:`Set up AI-native accounting: automatic transaction categorisation, bank reconciliation, and real-time burn and runway tracking`,p:false,c:{
          h:`AI-native accounting & burn tracking`,
          b:`I connect accounting tools to banking data, configure automated transaction categorisation, and build real-time burn and runway dashboards that update without anyone compiling them manually. Founders should be reading their financial position as a decision-making input, not constructing it from raw data — I set up the system that makes that possible from the start.`
        }},
        {t:`Build expense submission through an app rather than email or spreadsheet — make compliance the path of least resistance`,p:false,c:null},
      ],
      outcome:`Core financial operations — payroll, expenses, and bookkeeping — run automatically with minimal founder involvement; the team's operating rhythm and core workflows are established, documented, and designed to scale.`
    },
    {
      icon:`⬡`, name:`Product`,
      acts:[
        {t:`Build a working prototype that demonstrates the core technical claim is real — for physical products this means a bench-scale demonstration at an early TRL`,p:true,c:{
          h:`Agile programme management & design sprint facilitation`,
          b:`Before the final product shape is known, the work still needs to stay coordinated — which is where structured agile project management makes a real difference. I run sprint planning, standups, retrospectives, and reviews across the team and any external partners, keeping prototyping, planning, and delivery aligned without generating overhead. As Senior Project Manager on the Tranche Regions programme at the Ministry for the Environment, we worked from day one without knowing what the final system would look like. I established partnerships with regional bodies and piloted different elements of the system with those partners to discover what worked, leading the agile ceremonies that kept a team of 12 specialists and external partners coordinated throughout. That same discipline applies directly to early prototype work.`
        }},
        {t:`Apply design for scalability from day one: build as if someone else must deliver the product or service at volume — for physical products this means DFM; for software and services it means serviceability, repeatability, and documentation that doesn't require the founder to explain every step`,p:true,c:null},
        {t:`Apply the 90/10 principle: 90% of the value should come from the core technical differentiation, not peripheral features`,p:false,c:null},
        {t:`File provisional patents before any conference presentation or customer disclosure — public disclosure before filing can permanently invalidate IP in key jurisdictions, and it is one of the most common irreversible early mistakes`,p:false,c:null},
        {t:`Show the prototype to 10+ potential users or technical experts for structured feedback — structured feedback at this stage is cheap; the same feedback after specification freeze is expensive`,p:false,c:null},
      ],
      outcome:`A working prototype demonstrates the core technical claim and has been validated by at least 5 domain experts or potential end users.`
    },
    {
      icon:`◎`, name:`Market & Customers`,

/* ── Render ──────────────────────────────────────────────────── */
let active = 1;

function setColor(n){
  document.documentElement.style.setProperty('--sc', SC[n]);
}

function renderCard(c){
  const linkHtml = c.link
    ? `<a class="t-card-link" href="${esc(c.link.url)}" target="_blank" rel="noopener">${esc(c.link.text)} →</a>`
    : '';
  return `<div class="t-card">
    <div class="t-card-title">${esc(c.h)}</div>
    ${linkHtml}
    <div class="t-card-body">${esc(c.b)}</div>
  </div>`;
}

function renderPanel(n){
  const s = STAGES.find(x=>x.n===n);

  const rows = s.dims.map((d,i)=>{
    // Build paired act-l / act-r cells
    const cells = d.acts.map(a=>{
      const extra = a.p ? '' : ' x';
      const linked = a.c ? ' linked' : '';
      const hasC = a.c ? ' has-contrib' : '';
      return `<div class="act-l${extra}${linked}">${esc(a.t)}</div>` +
             `<div class="act-r${extra}${hasC}">${a.c ? renderCard(a.c) : ''}</div>`;
    }).join('');

    return `
      <div class="dim" id="d${n}_${i}" onclick="tog(${n},${i})">
        <div class="d-lbl">
          <span class="d-icon">${d.icon}</span>
          <span class="d-name">${esc(d.name)}</span>
          <div class="d-exp">
            Expand
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M2 3.5 5 6.5 8 3.5" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="d-body">
          ${cells}
          <div class="outcome-full"><strong>Outcome&nbsp;</strong>${esc(d.outcome)}</div>
        </div>
      </div>`;
  }).join('');

  return `<div class="panel">
    <div class="s-hdr">
      <div class="s-fund">${esc(s.fund)}</div>
      <h2>${esc(s.name)}</h2>
      <div class="s-meta">${esc(s.meta)}</div>
      <p class="s-intro">${esc(s.intro)}</p>
    </div>
    <div class="col-leg">
      <div class="cl"></div>
      <div class="cl">At this stage, you're&nbsp;…</div>
      <div class="cl green-head">Where I come in</div>
    </div>
    ${rows}
  </div>`;
}

function tog(n,i){
  document.getElementById(`d${n}_${i}`).classList.toggle('open');
}

function renderTabs(){
  document.getElementById('stageTabs').innerHTML = STAGES.map(s=>`
    <div class="tab${s.n===active?' on':''}" style="--sc:${SC[s.n]}" onclick="pick(${s.n})">
      <div class="tab-fund">${esc(s.fund)}</div>
      <div class="tab-name">${esc(s.name)}</div>
    </div>`).join('');
  updateTabFades();
}

function updateTabFades(){
  const el=document.getElementById('stageTabs');
  const max=el.scrollWidth-el.clientWidth;
  el.classList.toggle('fade-l', el.scrollLeft>4);
  el.classList.toggle('fade-r', el.scrollLeft<max-4);
}

function pick(n){
  active = n;
  setColor(n);
  renderTabs();
  document.getElementById('panelWrap').innerHTML = renderPanel(n);
  const bar = document.querySelector('.stage-bar');
  window.scrollTo({top: bar.offsetTop - 52, behavior:'smooth'});
}

/* ── Growth curve ──────────────────────────────────────────── */
function catmullRom(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return {
    x:.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y:.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function drawGrowthCurve(){
  const canvas=document.getElementById('growthCurve');
  const hero=document.querySelector('.hero');
  const W=window.innerWidth;
  /* Contain the whole graph within the hero so nothing hides behind the stage bar */
  const H=hero.offsetHeight;

  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;
  canvas.height=H*dpr;
  canvas.style.height=H+'px';
  const bg=document.getElementById('curveBg');
  bg.style.height=H+'px';

  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const GREEN='45,90,61';

  /* ── Chart geometry — anchored BELOW the hero text ── */
  const sub=hero.querySelector('.hero-sub');
  const bg2=document.getElementById('curveBg');
  const bgTop=bg2.getBoundingClientRect().top;
  const subRect=sub.getBoundingClientRect();
  /* Curve tip: below the paragraph on wide screens; on narrow screens
     the tip climbs clearly PAST (above) the subheading text level */
  const narrow=W<900;
  const tipY=narrow
    ? Math.round(subRect.top-bgTop)-28
    : Math.round(subRect.bottom-bgTop)+60;
  const x0=Math.max(48,W*0.05);       // curve start x
  const y0=H-28;                      // baseline near hero bottom
  const x1=W-Math.max(56,W*0.05);     // right edge

  /* ── The growth curve: clean monotonic exponential ── */
  const cx0=x0, cx1=x1-26;            // stop short of plot edge so the arrow fits
  const cy0=y0-6, cy1=tipY;
  /* Exponential steepness — sized so the tail goes near-vertical:
     target end-slope, converted to the k that produces it for this
     canvas's width/height ratio (clamped so desktop stays graceful) */
  const spanW=cx1-cx0, spanH=cy0-cy1;
  const k=Math.min(10, Math.max(3.8, 4.2*spanW/Math.max(spanH,1)));
  const N=160;
  const pts=[];
  for(let i=0;i<=N;i++){
    const t=i/N;
    const rise=(Math.exp(k*t)-1)/(Math.exp(k)-1);
    pts.push({x:cx0+(cx1-cx0)*t, y:cy0-(cy0-cy1)*rise});
  }

  /* Soft fill under the curve */
  const fillGrad=ctx.createLinearGradient(cx0,0,cx1,0);
  fillGrad.addColorStop(0,`rgba(${GREEN},0.015)`);
  fillGrad.addColorStop(1,`rgba(${GREEN},0.07)`);
  ctx.beginPath();
  ctx.moveTo(cx0,y0);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[N].x,y0);
  ctx.closePath();
  ctx.fillStyle=fillGrad;
  ctx.fill();

  /* Curve stroke — thickens and darkens toward the tip */
  for(let i=1;i<=N;i++){
    const t=i/N;
    const w=1.6+Math.pow(t,1.5)*3.4;
    const a=0.10+Math.pow(t,1.3)*0.28;
    ctx.beginPath();
    ctx.moveTo(pts[i-1].x,pts[i-1].y);
    ctx.lineTo(pts[i].x,pts[i].y);
    ctx.strokeStyle=`rgba(${GREEN},${a})`;
    ctx.lineWidth=w;
    ctx.lineCap='round';
    ctx.stroke();
  }

  /* ── Arrowhead at the tip, aligned to the curve's final direction ── */
  const tip=pts[N], prev=pts[N-6];
  const ang=Math.atan2(tip.y-prev.y,tip.x-prev.x);
  const L=16;
  ctx.save();
  ctx.translate(tip.x,tip.y);
  ctx.rotate(ang);
  ctx.beginPath();
  ctx.moveTo(L,0);
  ctx.lineTo(-L*0.55,-L*0.5);
  ctx.lineTo(-L*0.25,0);
  ctx.lineTo(-L*0.55,L*0.5);
  ctx.closePath();
  ctx.fillStyle=`rgba(${GREEN},0.42)`;
  ctx.fill();
  ctx.restore();
}

(function(){
  setColor(1);
  renderTabs();
  document.getElementById('panelWrap').innerHTML = renderPanel(1);
  /* Draw after layout settles */
  requestAnimationFrame(()=>requestAnimationFrame(drawGrowthCurve));
  window.addEventListener('resize',drawGrowthCurve,{passive:true});

  /* Tab-bar edge fades */
  const tabsEl=document.getElementById('stageTabs');
  tabsEl.addEventListener('scroll',updateTabFades,{passive:true});
  window.addEventListener('resize',updateTabFades,{passive:true});
  updateTabFades();

  /* Stage bar: transparent over hero (shows curve), frosted when sticky over content */
  const bar=document.querySelector('.stage-bar');
  function updateBar(){
    const heroH=document.querySelector('.hero').offsetHeight;
    bar.classList.toggle('bar-stuck', window.scrollY >= heroH);
  }
  window.addEventListener('scroll',updateBar,{passive:true});
  updateBar();
})();
</script>
